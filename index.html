<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БИззИ — Поиск питомцев</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #ff6b6b; --teal: #4ecdc4; --bg: #f5f6fa; --dark: #2f3640; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--dark); }
        .card { max-width: 450px; width: 100%; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--red); margin-bottom: 25px; font-size: 28px; }
        .field { margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 600; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #edf2f7; border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--teal); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-save { background: var(--teal); color: white; }
        .btn-save:disabled { background: #ccc; }
        .btn-email { background: #4a90e2; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-call { background: var(--red); color: white; text-decoration: none; display: block; text-align: center; }
        #profile-view, #result-step { display: none; }
        .dog-img { width: 100%; height: 300px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .url-res { word-break: break-all; font-size: 13px; background: #fff9db; padding: 20px; border-radius: 15px; border: 2px dashed #ffd43b; margin: 20px 0; font-family: monospace; }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <div id="create-step">
        <h1>🐾 БИззИ</h1>
        <div class="field"><input type="text" id="name" placeholder="Кличка собаки"></div>
        <div class="field"><input type="tel" id="phone" placeholder="Телефон (+7...)"></div>
        <div class="field"><input type="email" id="email" placeholder="Ваш Email (для уведомлений)"></div>
        <div class="field"><textarea id="features" placeholder="Особые приметы..."></textarea></div>
        <div class="field">
            <label>Фото питомца:</label>
            <input type="file" id="photo" accept="image/*">
        </div>
        <button class="btn btn-save" id="btn-save" onclick="saveData()">Создать QR-профиль</button>
    </div>

    <div id="result-step">
        <h2 style="text-align:center">Готово! 🎉</h2>
        <p>Ссылка для QR-кода или NFC:</p>
        <div id="link" class="url-res"></div>
        <button class="btn" style="background:#eee" onclick="location.reload()">Создать еще один</button>
    </div>

    <div id="profile-view">
        <img id="out-photo" class="dog-img">
        <h2 id="out-name" style="text-align: center; color: var(--red); margin: 0 0 15px 0;"></h2>
        <div class="info-box">
            <strong>Приметы:</strong> <span id="out-features"></span>
        </div>
        <a href="" id="out-phone" class="btn btn-call">📞 ПОЗВОНИТЬ ХОЗЯИНУ</a>
        <button class="btn btn-email" onclick="sendEmail()">📧 ОТПРАВИТЬ ГЕОПОЗИЦИЮ</button>
    </div>
</div>

<script>
    // Твой конфиг из скриншота
    const firebaseConfig = {
        apiKey: "AIzaSyAisVh4Y2P31Nlk1U4pFTTHbPT1Dd5CIMA",
        authDomain: "bizzi-ecece.firebaseapp.com",
        databaseURL: "https://bizzi-ecece-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bizzi-ecece",
        storageBucket: "bizzi-ecece.firebasestorage.app",
        messagingSenderId: "452376250717",
        appId: "1:452376250717:web:c9f1cef7b9c2fe828340b4",
        measurementId: "G-Z2YM1GWCS6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function saveData() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const file = document.getElementById('photo').files[0];
        const features = document.getElementById('features').value;

        if (!name || !phone || !email || !file) return alert("Заполните все поля и выберите фото!");

        const btn = document.getElementById('btn-save');
        btn.innerText = "Сохранение...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const max = 500; 
                let w = img.width, h = img.height;
                if (w > h) { h *= max/w; w = max; } else { w *= max/h; h = max; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const photoBase64 = canvas.toDataURL('image/jpeg', 0.8);

                try {
                    const doc = await db.collection("dogs").add({
                        n: name,
                        p: phone,
                        e: email,
                        f: features,
                        i: photoBase64,
                        t: Date.now()
                    });
                    document.getElementById('create-step').style.display = 'none';
                    document.getElementById('result-step').style.display = 'block';
                    document.getElementById('link').innerText = window.location.origin + window.location.pathname + "?id=" + doc.id;
                } catch (err) {
                    alert("Ошибка Firebase: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "Создать QR-профиль";
                }
            };
        };
        reader.readAsDataURL(file);
    }

    window.onload = async () => {
        const id = new URLSearchParams(window.location.search).get('id');
        if (id) {
            const doc = await db.collection("dogs").doc(id).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('create-step').style.display = 'none';
                document.getElementById('profile-view').style.display = 'block';
                document.getElementById('out-name').innerText = "Найден: " + data.n;
                document.getElementById('out-features').innerText = data.f || "не указаны";
                document.getElementById('out-photo').src = data.i;
                document.getElementById('out-phone').href = "tel:" + data.p;
                window.ownerEmail = data.e;
            }
        }
    };

    function sendEmail() {
        if (!window.ownerEmail) return alert("Email владельца не найден");
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude;
            const lon = p.coords.longitude;
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
            const subject = encodeURIComponent("Найдена ваша собака!");
            const body = encodeURIComponent(`Здравствуйте! Я нашел вашу собаку. Мое местоположение на карте: ${mapLink}`);
            window.location.href = `mailto:${window.ownerEmail}?subject=${subject}&body=${body}`;
        }, () => alert("Пожалуйста, включите GPS, чтобы отправить координаты владельцу."));
    }
</script>
</body>
</html>
