    <style>
        :root { --red: #ff6b6b; --teal: #4ecdc4; --bg: #f5f6fa; --dark: #2f3640; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--dark); }
        .card { max-width: 450px; width: 100%; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--red); margin-bottom: 25px; font-size: 28px; }
        .field { margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 600; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #edf2f7; border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--teal); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-save { background: var(--teal); color: white; }
        .btn-save:disabled { background: #ccc; }
        .btn-email { background: #4a90e2; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-call { background: var(--red); color: white; text-decoration: none; display: block; text-align: center; }
        #profile-view, #result-step { display: none; }
        .dog-img { width: 100%; height: 300px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .url-res { word-break: break-all; font-size: 13px; background: #fff9db; padding: 20px; border-radius: 15px; border: 2px dashed #ffd43b; margin: 20px 0; font-family: monospace; }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; }
    </style>
</head>

<div class="card">
    <div id="create-step">
        <h1>🐾 БИззИ</h1>
        <div class="field"><input type="text" id="name" placeholder="Кличка собаки"></div>
        <div class="field"><input type="tel" id="phone" placeholder="Телефон (+7...)"></div>
        <div class="field"><input type="email" id="email" placeholder="Ваш Email (для уведомлений)"></div>
        <div class="field"><textarea id="features" placeholder="Особые приметы..."></textarea></div>
        <div class="field">
            <label>Фото питомца:</label>
            <input type="file" id="photo" accept="image/*">
        </div>
        <button class="btn btn-save" id="btn-save" onclick="saveData()">Создать QR-профиль</button>
    </div>

    <div id="result-step">
        <h2 style="text-align:center">Готово! 🎉</h2>
        <p>Скопируйте ссылку и используйте её для NFC или QR-кода:</p>
        <div id="link" class="url-res"></div>
        <button class="btn" style="background:#eee" onclick="location.reload()">Создать ещё один</button>
    </div>

    <div id="profile-view">
        <img id="out-photo" class="dog-img">
        <h2 id="out-name" style="text-align: center; color: var(--red); margin: 0 0 15px 0;"></h2>
        <div class="info-box">
            <strong>Приметы:</strong> <span id="out-features"></span>
        </div>
        <a href="" id="out-phone" class="btn btn-call">📞 ПОЗВОНИТЬ ХОЗЯИНУ</a>
        <button class="btn btn-email" onclick="sendEmail()">📧 ОТПРАВИТЬ ГЕОПОЗИЦИЮ</button>
    </div>
</div>
